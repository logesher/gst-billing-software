{% extends "base.html" %}
{% block title %}Edit Customer{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h4>Edit Customer</h4>
            </div>
            <form method="POST">
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input type="text" class="form-control" name="name" value="{{ customer.name }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">GSTIN</label>
                        <input type="text" class="form-control" name="gstin" value="{{ customer.gstin or '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">State</label>
                        <input type="text" class="form-control" name="state" value="{{ customer.state }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Address</label>
                        <textarea class="form-control" name="address">{{ customer.address or '' }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" name="email" value="{{ customer.email or '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Phone</label>
                        <input type="text" class="form-control" name="phone" value="{{ customer.phone or '' }}">
                    </div>
                </div>
                <div class="card-footer">
                    <a href="{{ url_for('main.customer_list') }}" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">Update Customer</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
