{% extends "base.html" %}
{% block title %}Edit Product - GST Billing{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h4>{{ 'Edit' if product else 'Add' }} Product</h4>
            </div>
            <form method="POST">
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input type="text" name="name" class="form-control" value="{{ product.name if product else '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">HSN Code</label>
                        <input type="text" name="hsn_code" class="form-control" value="{{ product.hsn_code if product else '' }}">
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Rate (₹)</label>
                            <input type="number" step="0.01" name="rate" class="form-control" value="{{ product.rate if product else '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">GST %</label>
                            <input type="number" step="0.1" name="gst_percent" class="form-control" value="{{ product.gst_percent if product else '18.0' }}">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Stock Qty</label>
                            <input type="number" name="stock_qty" class="form-control" value="{{ product.stock_qty if product else '0' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Unit</label>
                            <input type="text" name="unit" class="form-control" value="{{ product.unit if product else 'Nos' }}">
                        </div>
                    </div>
                </div>
                <div class="card-footer">
                    <a href="{{ url_for('main.products') }}" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">Save Product</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
